name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  ACR_NAME: cu2registry
  ACR_LOGIN_SERVER: cu2registry.azurecr.io

jobs:
  # ─────────────────────────────────────────────
  # CI: Lint, Typecheck, Test, Build
  # ─────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @broflo/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web

  # ─────────────────────────────────────────────
  # Detect which services changed
  # ─────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      web: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.web }}
      api: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.api }}
      ai: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
            api:
              - 'apps/api/**'
              - 'packages/shared/**'
            ai:
              - 'services/ai/**'

  # ─────────────────────────────────────────────
  # Deploy: Web (Next.js standalone → Azure App Service)
  # ─────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.web == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build standalone
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://broflo-api.azurewebsites.net

      - name: Prepare deploy package
        run: |
          cd apps/web
          # Deploy standalone as-is (preserves monorepo node_modules resolution)
          mkdir -p .next/standalone/apps/web/.next
          cp -r .next/static .next/standalone/apps/web/.next/static
          cp -r public .next/standalone/apps/web/public 2>/dev/null || true

      - name: Zip deploy package
        run: cd apps/web/.next/standalone && zip -r ../../../../deploy-web.zip . -x '*.map'

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: broflo-web
          publish-profile: ${{ secrets.BROFLO_WEB_PUBLISH_PROFILE }}
          package: deploy-web.zip

  # ─────────────────────────────────────────────
  # Deploy: API (NestJS → Azure App Service)
  # ─────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.api == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @broflo/api prisma:generate

      - name: Build API
        run: pnpm build:api

      - name: Prepare deploy package
        run: |
          # Use pnpm deploy to create self-contained directory with resolved deps
          pnpm --filter @broflo/api deploy apps/api/deploy
          # Copy build output and Prisma artifacts into deploy dir
          cp -r apps/api/dist apps/api/deploy/dist
          cp -r apps/api/prisma apps/api/deploy/prisma 2>/dev/null || true
          cp -r apps/api/src/generated apps/api/deploy/src/generated 2>/dev/null || true

      - name: Zip deploy package
        run: cd apps/api/deploy && zip -r ../../../deploy-api.zip . -x '*.map'

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: broflo-api
          publish-profile: ${{ secrets.BROFLO_API_PUBLISH_PROFILE }}
          package: deploy-api.zip

  # ─────────────────────────────────────────────
  # Deploy: AI (FastAPI → ACR → Container App)
  # ─────────────────────────────────────────────
  deploy-ai:
    name: Deploy AI
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.ai == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image broflo-ai:${{ github.sha }} \
            --image broflo-ai:latest \
            services/ai/

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name broflo-ai \
            --resource-group rg-broflo \
            --image ${{ env.ACR_LOGIN_SERVER }}/broflo-ai:${{ github.sha }}
